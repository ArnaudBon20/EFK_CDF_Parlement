<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" id="swiss-map">
  <style>
    .canton {
      fill: #e0e0e0;
      stroke: #ffffff;
      stroke-width: 1;
      cursor: pointer;
      transition: fill 0.3s, opacity 0.2s;
    }
    .canton:hover {
      opacity: 0.8;
    }
    .canton.active {
      stroke: #003399;
      stroke-width: 2;
    }
    .canton-label {
      font-size: 8px;
      fill: #333;
      pointer-events: none;
      font-family: Arial, sans-serif;
      text-anchor: middle;
    }
  </style>
  
